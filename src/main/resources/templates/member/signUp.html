<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultrag.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<div layout:fragment="main">
    <script>
            var msg = "[[${errorMsg}]]"
            if (msg != null) alert(msg);
    </script>
    <div class="w-[400px] mx-auto py-[50px]">
        <form th:object="${userDto}" method="post"  th:action="@{/signUp}" >
            <input type =hidden th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="flex items-center mb-[15px] ">
            <span class="w-[80px]">아이디 :</span> <input type="text" th:field="*{userId}" class="border border-gray-700 rounded-[8px] flex-1 text-base" > <br>
            </div>
            <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="text-red-600 text-[10px]"></p>

            <div class="flex items-center mb-[15px]">
                <span class="w-[80px]">비밀번호 :</span> <input type="password" th:field="*{password}" class="border border-gray-700 rounded-[8px] flex-1"> <br>
            </div>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-600 text-[10px]"></p>

            <div class="flex items-center mb-[15px]">
                <span class="w-[80px]">이름 :</span> <input type="text" th:field="*{name}" class="border border-gray-700 rounded-[8px] flex-1"> <br>
            </div>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 text-[10px]"></p>

            <div class="flex items-center mb-[15px]">
                <span class="w-[80px]">연락처 : </span> <input type="text" th:field="*{tel}" class="border border-gray-700 rounded-[8px] flex-1"> <br>
            </div>
            <p th:if="${#fields.hasErrors('tel')}" th:errors="*{tel}" class="text-red-600 text-[10px]"></p>

            <div class="flex items-center mb-[15px]">
                <span class="w-[80px]">이메일 : </span> <input type="email" th:field="*{email}" class="border border-gray-700 rounded-[8px] flex-1"> <br>
            </div>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500"></p>
            <div class="flex items-center mb-[15px]">
                <button class="m-auto">가입</button>
            </div>
        </form>


    </div>

</div>

</html>
